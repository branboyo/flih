<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 440px; height: 280px; overflow: hidden;
    background: #0a0c14;
    font-family: 'SF Pro Display', -apple-system, 'Segoe UI', system-ui, sans-serif;
  }
</style>
</head>
<body>
<svg width="440" height="280" viewBox="0 0 440 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="440" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0f1e"/>
      <stop offset="100%" stop-color="#080a12"/>
    </linearGradient>

    <!-- Purple orb -->
    <radialGradient id="orb1" cx="320" cy="100" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0c14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80" cy="200" r="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0c14" stop-opacity="0"/>
    </radialGradient>

    <!-- Waveform gradient -->
    <linearGradient id="waveGrad" x1="200" y1="0" x2="440" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#a855f7" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#c084fc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow for icon -->
    <filter id="iconGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="url(#bg)"/>
  <rect width="440" height="280" fill="url(#orb1)"/>
  <rect width="440" height="280" fill="url(#orb2)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="140" x2="440" y2="140" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="220" y1="0" x2="220" y2="280" stroke="white" stroke-opacity="0.03" stroke-width="1"/>

  <!-- === LEFT: Icon + Text === -->

  <!-- Icon background (rounded square) — centered between eyebrow (bottom y=74) and Sampler (top ~y=151) -->
  <rect x="32" y="86" width="52" height="52" rx="12" fill="#111427" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Icon waveform bars — 5 bars centered in 52×52 box (center x=58, y=112) -->
  <g filter="url(#iconGlow)">
    <rect x="40" y="106" width="4" height="12" rx="2" fill="#a855f7" opacity="0.65"/>
    <rect x="48" y="101" width="4" height="22" rx="2" fill="#a855f7" opacity="0.82"/>
    <rect x="56" y="96"  width="4" height="32" rx="2" fill="#c084fc"/>
    <rect x="64" y="101" width="4" height="22" rx="2" fill="#a855f7" opacity="0.82"/>
    <rect x="72" y="106" width="4" height="12" rx="2" fill="#a855f7" opacity="0.65"/>
  </g>

  <!-- Eyebrow tag -->
  <rect x="32" y="56" width="130" height="18" rx="9" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="0.75"/>
  <text x="97" y="68.5" text-anchor="middle" fill="#818cf8" font-size="9" font-weight="600" letter-spacing="1.5" font-family="'SF Pro Text', system-ui, sans-serif">CHROME EXTENSION</text>

  <!-- Wordmark -->
  <text x="32" y="176" fill="#e0e2ef" font-size="36" font-weight="700" letter-spacing="-1" font-family="'SF Pro Display', -apple-system, system-ui, sans-serif">Sampler</text>

  <!-- Tagline -->
  <text x="32" y="200" fill="#6e7191" font-size="13" font-weight="400" letter-spacing="0.1" font-family="'SF Pro Text', system-ui, sans-serif">Record. Edit. Export to your DAW.</text>

  <!-- === RIGHT: Waveform visualization === -->

  <!-- Waveform bars — decorative, right side -->
  <g filter="url(#glow)" opacity="0.9">
    <!-- Bar data: x, y (from center 140), height*2 -->
    <rect x="210" y="131" width="4" height="18" rx="2" fill="url(#waveGrad)" opacity="0.4"/>
    <rect x="218" y="124" width="4" height="32" rx="2" fill="url(#waveGrad)" opacity="0.55"/>
    <rect x="226" y="116" width="4" height="48" rx="2" fill="url(#waveGrad)" opacity="0.65"/>
    <rect x="234" y="106" width="4" height="68" rx="2" fill="url(#waveGrad)" opacity="0.75"/>
    <rect x="242" y="98"  width="4" height="84" rx="2" fill="url(#waveGrad)" opacity="0.8"/>
    <rect x="250" y="88"  width="4" height="104" rx="2" fill="url(#waveGrad)" opacity="0.9"/>
    <rect x="258" y="80"  width="4" height="120" rx="2" fill="url(#waveGrad)"/>
    <rect x="266" y="72"  width="4" height="136" rx="2" fill="url(#waveGrad)"/>
    <rect x="274" y="66"  width="4" height="148" rx="2" fill="url(#waveGrad)"/>
    <rect x="282" y="60"  width="4" height="160" rx="2" fill="url(#waveGrad)"/>
    <rect x="290" y="68"  width="4" height="144" rx="2" fill="url(#waveGrad)"/>
    <rect x="298" y="78"  width="4" height="124" rx="2" fill="url(#waveGrad)" opacity="0.95"/>
    <rect x="306" y="90"  width="4" height="100" rx="2" fill="url(#waveGrad)" opacity="0.85"/>
    <rect x="314" y="102" width="4" height="76"  rx="2" fill="url(#waveGrad)" opacity="0.75"/>
    <rect x="322" y="112" width="4" height="56"  rx="2" fill="url(#waveGrad)" opacity="0.65"/>
    <rect x="330" y="120" width="4" height="40"  rx="2" fill="url(#waveGrad)" opacity="0.55"/>
    <rect x="338" y="128" width="4" height="24"  rx="2" fill="url(#waveGrad)" opacity="0.45"/>
    <rect x="346" y="132" width="4" height="16"  rx="2" fill="url(#waveGrad)" opacity="0.35"/>
    <rect x="354" y="116" width="4" height="48"  rx="2" fill="url(#waveGrad)" opacity="0.5"/>
    <rect x="362" y="104" width="4" height="72"  rx="2" fill="url(#waveGrad)" opacity="0.65"/>
    <rect x="370" y="118" width="4" height="44"  rx="2" fill="url(#waveGrad)" opacity="0.5"/>
    <rect x="378" y="126" width="4" height="28"  rx="2" fill="url(#waveGrad)" opacity="0.4"/>
    <rect x="386" y="133" width="4" height="14"  rx="2" fill="url(#waveGrad)" opacity="0.3"/>
    <rect x="394" y="135" width="4" height="10"  rx="2" fill="url(#waveGrad)" opacity="0.2"/>
    <rect x="402" y="136" width="4" height="8"   rx="2" fill="url(#waveGrad)" opacity="0.15"/>
    <rect x="410" y="137" width="4" height="6"   rx="2" fill="url(#waveGrad)" opacity="0.1"/>
  </g>

  <!-- Playhead line -->
  <line x1="282" y1="56" x2="282" y2="224" stroke="#c084fc" stroke-width="1" stroke-opacity="0.6"/>
  <circle cx="282" cy="56" r="3" fill="#c084fc" opacity="0.8"/>

  <!-- Bottom border highlight -->
  <rect x="0" y="278" width="440" height="2" fill="url(#waveGrad)" opacity="0.3"/>
</svg>
</body>
</html>
