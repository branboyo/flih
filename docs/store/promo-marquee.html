<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1400px; height: 560px; overflow: hidden;
    background: #0a0c14;
  }
</style>
</head>
<body>
<svg width="1400" height="560" viewBox="0 0 1400 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0f1e"/>
      <stop offset="100%" stop-color="#08090f"/>
    </linearGradient>

    <!-- Orbs -->
    <radialGradient id="orb1" cx="400" cy="200" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0a0c14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="1050" cy="360" r="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0c14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="700" cy="560" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0c14" stop-opacity="0"/>
    </radialGradient>

    <!-- Wave gradients -->
    <linearGradient id="waveMain" x1="560" y1="0" x2="1400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#818cf8" stop-opacity="0.2"/>
      <stop offset="25%"  stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="50%"  stop-color="#c084fc" stop-opacity="1"/>
      <stop offset="75%"  stop-color="#818cf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.3"/>
    </linearGradient>

    <linearGradient id="waveFade" x1="560" y1="0" x2="1400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="40%"  stop-color="#a855f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.1"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iconGlow" x="-75%" y="-75%" width="250%" height="250%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Pill clip -->
    <clipPath id="pill">
      <rect width="1400" height="560"/>
    </clipPath>
  </defs>

  <!-- Background layers -->
  <rect width="1400" height="560" fill="url(#bg)"/>
  <rect width="1400" height="560" fill="url(#orb1)"/>
  <rect width="1400" height="560" fill="url(#orb2)"/>
  <rect width="1400" height="560" fill="url(#orb3)"/>

  <!-- Subtle horizontal rule at center -->
  <line x1="0" y1="280" x2="1400" y2="280" stroke="white" stroke-opacity="0.025" stroke-width="1"/>

  <!-- ===== LEFT COLUMN: branding ===== -->

  <!-- Eyebrow pill -->
  <rect x="64" y="148" width="160" height="22" rx="11" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.35)" stroke-width="0.75"/>
  <text x="144" y="163" text-anchor="middle" fill="#818cf8" font-size="9.5" font-weight="600" letter-spacing="2" font-family="'SF Pro Text', -apple-system, system-ui, sans-serif">CHROME EXTENSION</text>

  <!-- Icon -->
  <rect x="64" y="186" width="64" height="64" rx="16" fill="#111427" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- 5-bar icon, ratio matched to promo-small (span/box=0.69, peak/box=0.62) -->
  <!-- box=64px: span=46 (w=6 gap=4), peak=40, center x=96 y=218, rx=3 -->
  <g filter="url(#iconGlow)">
    <rect x="73"  y="211" width="6" height="14" rx="3" fill="#a855f7" opacity="0.65"/>
    <rect x="83"  y="205" width="6" height="26" rx="3" fill="#a855f7" opacity="0.82"/>
    <rect x="93"  y="198" width="6" height="40" rx="3" fill="#c084fc"/>
    <rect x="103" y="205" width="6" height="26" rx="3" fill="#a855f7" opacity="0.82"/>
    <rect x="113" y="211" width="6" height="14" rx="3" fill="#a855f7" opacity="0.65"/>
  </g>

  <!-- Main wordmark -->
  <text x="64" y="316" fill="#e0e2ef" font-size="72" font-weight="800" letter-spacing="-3" font-family="'SF Pro Display', -apple-system, system-ui, sans-serif">Sampler</text>

  <!-- Tagline -->
  <text x="64" y="352" fill="#6e7191" font-size="18" font-weight="400" letter-spacing="0.2" font-family="'SF Pro Text', -apple-system, system-ui, sans-serif">Record tab audio. Edit the waveform. Export to your DAW.</text>

  <!-- Feature pills row -->
  <!-- Pill 1: Record -->
  <rect x="64" y="384" width="90" height="28" rx="14" fill="rgba(168,85,247,0.12)" stroke="rgba(168,85,247,0.25)" stroke-width="0.75"/>
  <text x="109" y="402.5" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="500" letter-spacing="0.3" font-family="'SF Pro Text', -apple-system, system-ui, sans-serif">Tab Capture</text>

  <!-- Pill 2: Waveform -->
  <rect x="166" y="384" width="112" height="28" rx="14" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="0.75"/>
  <text x="222" y="402.5" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="500" letter-spacing="0.3" font-family="'SF Pro Text', -apple-system, system-ui, sans-serif">Waveform Editor</text>

  <!-- Pill 3: FX -->
  <rect x="290" y="384" width="68" height="28" rx="14" fill="rgba(103,232,249,0.08)" stroke="rgba(103,232,249,0.2)" stroke-width="0.75"/>
  <text x="324" y="402.5" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="500" letter-spacing="0.3" font-family="'SF Pro Text', -apple-system, system-ui, sans-serif">FX Chain</text>

  <!-- Pill 4: Local -->
  <rect x="370" y="384" width="82" height="28" rx="14" fill="rgba(110,231,183,0.08)" stroke="rgba(110,231,183,0.2)" stroke-width="0.75"/>
  <text x="411" y="402.5" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500" letter-spacing="0.3" font-family="'SF Pro Text', -apple-system, system-ui, sans-serif">100% Local</text>

  <!-- ===== RIGHT COLUMN: waveform visualization ===== -->

  <!-- Background waveform (ghost, behind) -->
  <g opacity="0.18" filter="url(#softglow)">
    <rect x="560" y="238" width="6" height="84"  rx="3" fill="url(#waveMain)"/>
    <rect x="572" y="220" width="6" height="120" rx="3" fill="url(#waveMain)"/>
    <rect x="584" y="200" width="6" height="160" rx="3" fill="url(#waveMain)"/>
    <rect x="596" y="180" width="6" height="200" rx="3" fill="url(#waveMain)"/>
    <rect x="608" y="168" width="6" height="224" rx="3" fill="url(#waveMain)"/>
    <rect x="620" y="155" width="6" height="250" rx="3" fill="url(#waveMain)"/>
    <rect x="632" y="145" width="6" height="270" rx="3" fill="url(#waveMain)"/>
    <rect x="644" y="140" width="6" height="280" rx="3" fill="url(#waveMain)"/>
    <rect x="656" y="135" width="6" height="290" rx="3" fill="url(#waveMain)"/>
    <rect x="668" y="130" width="6" height="300" rx="3" fill="url(#waveMain)"/>
    <rect x="680" y="138" width="6" height="284" rx="3" fill="url(#waveMain)"/>
    <rect x="692" y="148" width="6" height="264" rx="3" fill="url(#waveMain)"/>
    <rect x="704" y="162" width="6" height="236" rx="3" fill="url(#waveMain)"/>
    <rect x="716" y="178" width="6" height="204" rx="3" fill="url(#waveMain)"/>
    <rect x="728" y="195" width="6" height="170" rx="3" fill="url(#waveMain)"/>
    <rect x="740" y="215" width="6" height="130" rx="3" fill="url(#waveMain)"/>
    <rect x="752" y="232" width="6" height="96"  rx="3" fill="url(#waveMain)"/>
    <rect x="764" y="242" width="6" height="76"  rx="3" fill="url(#waveMain)"/>
    <rect x="776" y="200" width="6" height="160" rx="3" fill="url(#waveMain)"/>
    <rect x="788" y="180" width="6" height="200" rx="3" fill="url(#waveMain)"/>
    <rect x="800" y="195" width="6" height="170" rx="3" fill="url(#waveMain)"/>
    <rect x="812" y="218" width="6" height="124" rx="3" fill="url(#waveMain)"/>
    <rect x="824" y="235" width="6" height="90"  rx="3" fill="url(#waveMain)"/>
  </g>

  <!-- Main waveform (foreground) -->
  <g filter="url(#glow)">
    <rect x="840"  y="242" width="6" height="76"  rx="3" fill="url(#waveMain)" opacity="0.5"/>
    <rect x="852"  y="228" width="6" height="104" rx="3" fill="url(#waveMain)" opacity="0.6"/>
    <rect x="864"  y="210" width="6" height="140" rx="3" fill="url(#waveMain)" opacity="0.7"/>
    <rect x="876"  y="192" width="6" height="176" rx="3" fill="url(#waveMain)" opacity="0.78"/>
    <rect x="888"  y="174" width="6" height="212" rx="3" fill="url(#waveMain)" opacity="0.84"/>
    <rect x="900"  y="158" width="6" height="244" rx="3" fill="url(#waveMain)" opacity="0.88"/>
    <rect x="912"  y="143" width="6" height="274" rx="3" fill="url(#waveMain)" opacity="0.92"/>
    <rect x="924"  y="132" width="6" height="296" rx="3" fill="url(#waveMain)" opacity="0.95"/>
    <rect x="936"  y="123" width="6" height="314" rx="3" fill="url(#waveMain)" opacity="0.97"/>
    <rect x="948"  y="116" width="6" height="328" rx="3" fill="url(#waveMain)"/>
    <rect x="960"  y="110" width="6" height="340" rx="3" fill="url(#waveMain)"/>
    <rect x="972"  y="116" width="6" height="328" rx="3" fill="url(#waveMain)"/>
    <rect x="984"  y="124" width="6" height="312" rx="3" fill="url(#waveMain)" opacity="0.97"/>
    <rect x="996"  y="134" width="6" height="292" rx="3" fill="url(#waveMain)" opacity="0.93"/>
    <rect x="1008" y="145" width="6" height="270" rx="3" fill="url(#waveMain)" opacity="0.89"/>
    <rect x="1020" y="160" width="6" height="240" rx="3" fill="url(#waveMain)" opacity="0.83"/>
    <rect x="1032" y="176" width="6" height="208" rx="3" fill="url(#waveMain)" opacity="0.76"/>
    <rect x="1044" y="194" width="6" height="172" rx="3" fill="url(#waveMain)" opacity="0.68"/>
    <rect x="1056" y="213" width="6" height="134" rx="3" fill="url(#waveMain)" opacity="0.6"/>
    <rect x="1068" y="230" width="6" height="100" rx="3" fill="url(#waveMain)" opacity="0.52"/>
    <rect x="1080" y="243" width="6" height="74"  rx="3" fill="url(#waveMain)" opacity="0.44"/>
    <!-- Second phrase -->
    <rect x="1100" y="230" width="6" height="100" rx="3" fill="url(#waveMain)" opacity="0.48"/>
    <rect x="1112" y="216" width="6" height="128" rx="3" fill="url(#waveMain)" opacity="0.56"/>
    <rect x="1124" y="198" width="6" height="164" rx="3" fill="url(#waveMain)" opacity="0.64"/>
    <rect x="1136" y="182" width="6" height="196" rx="3" fill="url(#waveMain)" opacity="0.72"/>
    <rect x="1148" y="200" width="6" height="160" rx="3" fill="url(#waveMain)" opacity="0.64"/>
    <rect x="1160" y="218" width="6" height="124" rx="3" fill="url(#waveMain)" opacity="0.56"/>
    <rect x="1172" y="234" width="6" height="92"  rx="3" fill="url(#waveMain)" opacity="0.46"/>
    <rect x="1184" y="244" width="6" height="72"  rx="3" fill="url(#waveMain)" opacity="0.38"/>
    <rect x="1196" y="250" width="6" height="60"  rx="3" fill="url(#waveMain)" opacity="0.3"/>
    <rect x="1208" y="254" width="6" height="52"  rx="3" fill="url(#waveMain)" opacity="0.24"/>
    <rect x="1220" y="258" width="6" height="44"  rx="3" fill="url(#waveMain)" opacity="0.18"/>
    <rect x="1232" y="261" width="6" height="38"  rx="3" fill="url(#waveMain)" opacity="0.13"/>
    <rect x="1244" y="264" width="6" height="32"  rx="3" fill="url(#waveMain)" opacity="0.09"/>
    <rect x="1256" y="266" width="6" height="28"  rx="3" fill="url(#waveMain)" opacity="0.06"/>
    <rect x="1268" y="268" width="6" height="24"  rx="3" fill="url(#waveMain)" opacity="0.04"/>
  </g>

  <!-- Playhead -->
  <line x1="960" y1="100" x2="960" y2="460" stroke="#c084fc" stroke-width="1.5" stroke-opacity="0.65"/>
  <circle cx="960" cy="100" r="4" fill="#c084fc" opacity="0.9"/>
  <circle cx="960" cy="460" r="4" fill="#c084fc" opacity="0.9"/>

  <!-- Trim region highlight -->
  <rect x="888" y="108" width="144" height="344" rx="2" fill="rgba(192,132,252,0.04)" stroke="rgba(192,132,252,0.15)" stroke-width="0.75"/>

  <!-- Time label under playhead -->
  <rect x="942" y="466" width="36" height="16" rx="4" fill="#1a1d33"/>
  <text x="960" y="477.5" text-anchor="middle" fill="#c084fc" font-size="9" font-weight="500" font-family="'SF Pro Mono', 'JetBrains Mono', monospace">0:04.2</text>

  <!-- Waveform track label -->
  <rect x="560" y="488" width="60" height="16" rx="4" fill="#111427" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
  <text x="590" y="499.5" text-anchor="middle" fill="#6e7191" font-size="9" font-weight="500" letter-spacing="0.5" font-family="'SF Pro Text', system-ui, sans-serif">TRACK 1</text>

  <!-- Divider line between left and right -->
  <line x1="528" y1="100" x2="528" y2="460" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Bottom edge accent -->
  <rect x="0" y="557" width="1400" height="3" fill="url(#waveMain)" opacity="0.25"/>

  <!-- Top subtle border -->
  <rect x="0" y="0" width="1400" height="1" fill="rgba(255,255,255,0.04)"/>
</svg>
</body>
</html>
